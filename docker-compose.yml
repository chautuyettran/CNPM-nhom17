services:
  backend:
    build: .
    ports:
      - "3000:5000"
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=password
    depends_on:
      - db  
  db:
    image: mysql:8.0
    environment:
      - MYSQL_DATABASE=task_management
      - MYSQL_ROOT_PASSWORD=password
    volumes:
      - db_data:/var/lib/mysql 

volumes:
  db_data: 