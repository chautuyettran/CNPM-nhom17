<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - ViệcFlow</title>
    <link rel="stylesheet" href="css\auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        /* Thêm style cho vùng hiển thị thông báo nhanh */
        .alert-box {
            display: none;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 4px;
            font-size: 14px;
            text-align: center;
        }
        .alert-error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .alert-success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    </style>
</head>

<body>

    <div class="container">

        <div class="left">
            <h1>🚀 ViệcFlow</h1>
            <p>Quản lý công việc thông minh, làm việc nhóm hiệu quả</p>
        </div>

        <div class="right">
            <h2>Đăng nhập</h2>

            <div id="thongBao" class="alert-box"></div>

            <div class="input-group">
                <i class="fa fa-envelope"></i>
                <input id="email" type="email" placeholder="Email">
            </div>

            <div class="input-group">
                <i class="fa fa-lock"></i>
                <input id="matkhau" type="password" placeholder="Mật khẩu">
            </div>

            <button onclick="dangNhap()">Đăng nhập</button>

            <div class="or-text">─ Hoặc ─</div>
            <div class="google-btn-container">
                <div id="buttonDiv"></div>
            </div>
            
            <p>Chưa có tài khoản?
                <a href="register.html">Đăng ký</a>
            </p>
        </div>

    </div>

    <script src="js\api.js"></script>
    <script src="js\auth.js"></script>
</body>

</html>
