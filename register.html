<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký</title>
    <link rel="stylesheet" href="css\auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="left">
            <h1>Task Manager</h1>
            <p>
                Tạo tài khoản để bắt đầu quản lý công việc của bạn một cách hiệu quả,
                theo dõi tiến độ và làm việc nhóm dễ dàng.
            </p>
        </div>
        <div class="right">
            <h2>Đăng ký</h2>
            <div id="thongBao" class="alert-box"></div>
            <div class="input-group">
                <i class="fa fa-user"></i>
                <input id="hoten" type="text" placeholder="Họ và tên">
            </div>
            <div class="input-group">
                <i class="fa fa-envelope"></i>
                <input id="email" type="email" placeholder="Email">
            </div>
            <div class="input-group">
                <i class="fa fa-lock"></i>
                <input id="matkhau" type="password" placeholder="Mật khẩu">
            </div>
            <div class="input-group">
                <i class="fa fa-lock"></i>
                <input id="nhaplaimatkhau" type="password" placeholder="Nhập lại mật khẩu">
            </div>
            <button onclick="dangKy()">Đăng ký</button>
            <p>
                Đã có tài khoản?
                <a href="login.html">Đăng nhập</a>
            </p>
        </div>
    </div>
    <script src="js\api.js"></script>
    <script src="js\auth.js"></script>
    <div id="thongbao"></div>
</body>
</html>
