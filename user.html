<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tài khoản</title>
    <link rel="stylesheet" href="css\user.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <div class="profile-container">
        <div class="profile-header">
            <img id="avatarPreview" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
            <input type="file" id="avatarInput" accept="image/*" onchange="changeAvatar(event)" hidden>
            <button class="avatar-btn" onclick="document.getElementById('avatarInput').click()">
                Đổi ảnh
            </button>
            <button class="delete-avatar-btn" onclick="removeAvatar()">
                Xoá ảnh
            </button>
            <h1>Tài khoản</h1>
        </div>
        <div class="profile-item">
            <label>Họ và tên</label>
            <input type="text" id="username" placeholder="Nhập tên">
        </div>
        <div class="profile-item">
            <label>Email</label>
            <input type="email" id="email" placeholder="Nhập email">
        </div>
        <div class="profile-item">
            <label>Vai trò</label>
            <input type="text" id="role" placeholder="Nhập vai trò">
        </div>
        <div class="button-group">
            <button class="save-btn" onclick="saveProfile()">
                Lưu thay đổi
            </button>
            <button class="back-btn" onclick="window.location.href='index.html'">
                Quay lại
            </button>
        </div>
    </div>
    <script src="js\user.js"></script>
</body>
</html>
